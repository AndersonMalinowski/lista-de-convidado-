<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Painel de Gerenciamento de Convidados</h1>
    
    <div class="container">
        <div class="card">
            <h2>Convidados (MAIÚSCULO)</h2>
            <ul id="lista-maiuscula"></ul>
        </div>

        <div class="card">
            <h2>Começam com "A"</h2>
            <p id="contador-a"></p>
            <ul id="lista-letra-a"></ul>
        </div>

        <div class="card">
            <h2>Nomes Longos (> 5 letras)</h2>
            <ul id="lista-longos"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
