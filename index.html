<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Convidados Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Controle de Convidados</h1>

    <div class="filtro-container">
        <span>Filtrar por letra:</span>
        <div id="alfabeto" class="botoes-alfabeto"></div>
        <button onclick="renderizarListas()" class="btn-limpar">Mostrar Todos</button>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>Todos (MAIÚSCULO)</h2>
            <ul id="lista-maiuscula"></ul>
        </div>

        <div class="card">
            <h2>Começam com "A"</h2>
            <p id="contador-a"></p>
            <ul id="lista-letra-a"></ul>
        </div>

        <div class="card">
            <h2>Nomes Longos (> 5 letras)</h2>
            <ul id="lista-longos"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
